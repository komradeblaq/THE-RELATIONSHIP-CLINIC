<!DOCTYPE html>
<html>
<head>
  <title>Ask a Question - THE RELATIONSHIP CLINIC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script>
    function sendWhatsAppMessage(event) {
      event.preventDefault();
      const name = document.getElementById('name').value;
      const country = document.getElementById('country').value;
      const status = document.getElementById('status').value;
      const question = document.getElementById('question').value;
      const message = `Name: ${name}\nCountry: ${country}\nRelationship Status: ${status}\nQuestion: ${question}`;
      const phone = "+2349060166133";
      const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
      window.open(url, '_blank');
    }
  </script>
</head>
<body>

<header class="header">
  <div class="logo-name">
    <img src="image/logo.png" alt="TRC Logo" class="logo">
    <h1 class="site-title">THE RELATIONSHIP CLINIC (TRC)</h1>
  </div>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="teachings.html">Teachings</a>
    <a href="marriage-class.html">Marriage Class</a>
    <a href="books.html">Books</a>
    <a href="contact.html" class="active">Ask a Question</a>
  </nav>
</header>

<section class="container contact-card">
  <h2>Ask a Question</h2>
  <form onsubmit="sendWhatsAppMessage(event)">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" placeholder="Your Name" required>

    <label for="country">Country:</label>
    <select id="country" name="country" required>
      <option value="">Select Your Country</option>
      <option value="Nigeria">Nigeria</option>
      <option value="Ghana">Ghana</option>
      <option value="Kenya">Kenya</option>
      <option value="South Africa">South Africa</option>
      <option value="USA">USA</option>
      <option value="UK">UK</option>
      <option value="Canada">Canada</option>
      <option value="Other">Other</option>
    </select>

    <label for="status">Relationship Status:</label>
    <select id="status" name="status" required>
      <option value="">Select Status</option>
      <option value="Single">Single</option>
      <option value="In a Relationship">In a Relationship</option>
      <option value="Engaged">Engaged</option>
      <option value="Married">Married</option>
      <option value="Separated">Separated</option>
      <option value="Divorced">Divorced</option>
    </select>

    <label for="question">Your Question:</label>
    <textarea id="question" name="question" rows="5" placeholder="Type your question here..." required></textarea>

    <button type="submit" class="submit-button">Submit</button>
  </form>
</section>

</footer>

</body>
</html>
