<!DOCTYPE html>
<html>
<head>
  <title>Ask a Question - THE RELATIONSHIP CLINIC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Card style */
    .card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
      max-width: 700px;
      margin: 20px auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #4B0082;
    }

    form {
      display: grid;
      gap: 15px;
    }

    label {
      font-weight: bold;
      color: #333;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
    }

    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .form-row > div {
      flex: 1 1 300px;
    }

    button.buy-button {
      background-color: #FF4500; /* burnt orange */
      color: #fff;
      font-weight: bold;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.3s;
    }

    button.buy-button:hover {
      background-color: #e03e00;
    }

    /* Header styling */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      background: #4B0082;
      padding: 12px 15px;
      color: #fff;
    }

    header .logo-name {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header .site-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: #FF4500;
    }

    nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 5px;
    }

    nav a.active {
      background-color: #FFD700;
      color: #4B0082;
    }

    nav a:hover {
      background-color: #FFD700;
      color: #4B0082;
    }

    /* MOBILE ADJUSTMENTS */
    @media (max-width: 768px) {
      .form-row {
        flex-direction: column;
        gap: 8px; /* smaller gap on mobile */
      }

      .card {
        padding: 15px; /* smaller padding on mobile */
        margin: 10px;
      }

      nav {
        flex-direction: column;
        width: 100%;
      }

      h2 {
        font-size: 1.4rem;
        margin-bottom: 15px;
      }

      button.buy-button {
        padding: 8px;
        font-size: 0.95rem;
      }
    }
  </style>

  <script>
    function sendWhatsAppMessage(event) {
      event.preventDefault();
      const name = document.getElementById('name').value;
      const country = document.getElementById('country').value;
      const status = document.getElementById('status').value;
      const question = document.getElementById('question').value;

      const message = `Name: ${name}\nCountry: ${country}\nRelationship Status: ${status}\nQuestion: ${question}`;
      const phone = "+2349060166133";
      const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

      window.open(url, '_blank');
    }
  </script>
</head>
<body>

<header>
  <div class="logo-name">
    <a href="index.html"><img src="image/logo.png" alt="THE RELATIONSHIP CLINIC Logo" style="width:55px;"></a>
    <span class="site-title">THE RELATIONSHIP CLINIC</span>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="teachings.html">Teachings</a>
    <a href="marriage-class.html">Marriage Class</a>
    <a href="books.html">Books</a>
    <a href="contact.html" class="active">Ask a Question</a>
  </nav>
</header>

<div class="container">
  <div class="card">
    <h2>Ask a Question</h2>
    <form onsubmit="sendWhatsAppMessage(event)">
      <div class="form-row">
        <div>
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" placeholder="Your Name" required>
        </div>
        <div>
          <label for="country">Country:</label>
          <select id="country" name="country" required>
            <option value="">Select Your Country</option>
            <option value="Nigeria">Nigeria</option>
            <option value="Ghana">Ghana</option>
            <option value="Kenya">Kenya</option>
            <option value="South Africa">South Africa</option>
            <option value="USA">USA</option>
            <option value="UK">UK</option>
            <option value="Canada">Canada</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="status">Relationship Status:</label>
          <select id="status" name="status" required>
            <option value="">Select Status</option>
            <option value="Single">Single</option>
            <option value="In a Relationship">In a Relationship</option>
            <option value="Engaged">Engaged</option>
            <option value="Married">Married</option>
            <option value="Separated">Separated</option>
            <option value="Divorced">Divorced</option>
          </select>
        </div>
      </div>

      <div>
        <label for="question">Your Question:</label>
        <textarea id="question" name="question" rows="4" placeholder="Type your question here..." required></textarea>
      </div>

      <button type="submit" class="buy-button">Submit</button>
    </form>
  </div>
</div>

<footer style="background:#4B0082; color:#fff; padding:18px; text-align:center; margin-top:25px;">

  </p>

    <a href="https://chat.whatsapp.com/B5AoRjJ9Fd1DAfIZpSRTqX" target="_blank" style="color:#FFD700; text-decoration:none; margin-right:15px;">WhatsApp Group</a>
    <a href="https://www.facebook.com/share/1GtAcSniRW/" target="_blank" style="color:#FFD700; text-decoration:none;">Facebook</a>
  </p>
  <p>&copy; 2026 THE RELATIONSHIP CLINIC. All rights reserved.</p>
</footer>

</body>
</html>
