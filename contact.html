<!DOCTYPE html>
<html>
<head>
  <title>Ask a Question - THE RELATIONSHIP CLINIC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:0; }
    .container { max-width:1200px; margin:0 auto; padding:20px; }
    header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; padding:10px 20px; background-color:#4B0082; }
    header img { height:60px; }
    header nav a { color:#fff; margin:0 10px; text-decoration:none; font-weight:bold; }
    .card { background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); margin-bottom:20px; }
    input, textarea { width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc; }
    button { padding:10px 20px; background:#4B0082; color:#fff; border:none; border-radius:5px; cursor:pointer; }
    @media(max-width:768px){
      header { flex-direction:column; align-items:flex-start; }
      header nav { width:100%; margin-top:10px; }
      header nav a { display:block; margin:5px 0; }
      .container { padding:10px; }
      .card { padding:15px; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html"><img src="image/logo.png" alt="THE RELATIONSHIP CLINIC Logo"></a>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="teachings.html">Teachings</a>
    <a href="marriage-class.html">Marriage Class</a>
    <a href="books.html">Books</a>
    <a href="contact.html">Ask a Question</a>
  </nav>
</header>

<div class="container">
  <div class="card">
    <h2>Ask a Question</h2>
    <form action="https://api.whatsapp.com/send?phone=2349060166133&text=" method="get" target="_blank">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="text" name="country" placeholder="Your Country" required>
      <input type="text" name="relationship_status" placeholder="Relationship Status" required>
      <textarea name="question" placeholder="Your Question" required></textarea>
      <button type="submit">Send to WhatsApp</button>
    </form>
  </div>
</div>

</body>
</html>
